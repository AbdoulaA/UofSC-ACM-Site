<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Title -->
    <title>ACM @ UofSC</title>

    <!-- Description -->
    <meta
      name="description"
      content="The official website of the University of South Carolina ACM chapter. Events, workshops, and community for computing students."
    />

    <!-- Open Graph (iMessage / social previews) -->
    <meta property="og:title" content="ACM @ UofSC" />
    <meta
      property="og:description"
      content="Join the Association for Computing Machinery at the University of South Carolina."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://acm.mufticraft.store/" />

    <!-- IMPORTANT: must be absolute URL -->
    <meta
      property="og:image"
      content="https://acm.mufticraft.store/acmlogo-grad.png"
    />

    <!-- Twitter (optional but good) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ACM @ UofSC" />
    <meta
      name="twitter:description"
      content="UofSC's ACM chapter — events, networking, and learning."
    />
    <meta
      name="twitter:image"
      content="https://acm.mufticraft.store/acmlogo.png"
    />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
